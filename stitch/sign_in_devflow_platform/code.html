<!-- Background Particles / Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none z-1 overflow-hidden" id="particles-container"></div>
<script>
        // Simple micro-interaction for password visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        const passIcon = togglePass.querySelector('span');

        togglePass.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.innerText = 'visibility';
            }
        });

        // Lightweight background effect
        const container = document.getElementById('particles-container');
        const createParticle = () => {
            const p = document.createElement('div');
            const size = Math.random() * 2 + 1;
            p.style.position = 'absolute';
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.backgroundColor = 'rgba(173, 198, 255, 0.2)';
            p.style.borderRadius = '50%';
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;
            p.style.filter = 'blur(1px)';
            
            const duration = Math.random() * 20 + 10;
            p.animate([
                { transform: 'translateY(0)', opacity: 0 },
                { transform: 'translateY(-100px)', opacity: 0.5 },
                { transform: 'translateY(-200px)', opacity: 0 }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                easing: 'linear'
            });

            container.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        };

        for(let i=0; i<30; i++) createParticle();
        setInterval(createParticle, 2000);

        // Form submission loading state simulation
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span> Authenticating...`;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Redirect logic would go here
            }, 2000);
        });
    </script>
